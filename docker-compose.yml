services:
  api-1: &api
    image: iuryasilva/rinha-2026:latest
    environment:
      EVENT_LOOP_POOL_SIZE: "2"
      INTERNAL_WARMUP_ROUNDS: "500"
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "155MB"

  api-2:
    <<: *api

  nginx:
    image: nginx:stable-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2
    networks:
      - rinha-net
    ports:
      - "9999:80"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "40MB"

networks:
  rinha-net:
    driver: bridge
