services:
  api1:
    build: .
    image: rinha-hello:latest
    container_name: api1
    environment:
      INSTANCE_ID: api1
      JAVA_OPTS: ""
      WORKER_POOL_SIZE: "12"
      EVENT_LOOP_POOL_SIZE: "1"
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: '150MB'

  api2:
    image: rinha-hello:latest
    container_name: api2
    environment:
      INSTANCE_ID: api2
      JAVA_OPTS: ""
      WORKER_POOL_SIZE: "12"
      EVENT_LOOP_POOL_SIZE: "1"
    depends_on:
      - api1
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: '150MB'

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "9999:80"
    environment:
      WARMUP_ROUNDS: "60"
      WARMUP_CONCURRENCY: "50"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: '50MB'

networks:
  rinha-net:
    driver: bridge
